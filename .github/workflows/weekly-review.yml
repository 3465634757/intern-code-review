name: 实习生周度代码审查

on:
  schedule:
    # 每周五下午5点(UTC+8) = 每周五 09:00 UTC
    - cron: '0 9 * * 5'
  workflow_dispatch:
    inputs:
      week:
        description: '审查周（格式: 2026-W24，留空则自动取本周）'
        required: false
        type: string
      since:
        description: '起始日期（格式: 2026-06-01，留空则根据 week 自动计算）'
        required: false
        type: string
        default: ''
      provider:
        description: 'AI Provider（gemini/deepseek/siliconflow/anthropic/openai，留空自动检测）'
        required: false
        type: string
        default: ''
      dry_run:
        description: '试运行（只收集数据，不调用AI）'
        required: false
        type: boolean
        default: false

env:
  REPORTS_BASE: reports

jobs:
  # 从 interns.yml 动态读取实习生列表
  load-interns:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 读取实习生配置
        id: set-matrix
        run: |
          # 用 python 解析 YAML 生成 matrix JSON
          MATRIX=$(python3 -c "
          import yaml, json
          with open('config/interns.yml', 'r') as f:
              config = yaml.safe_load(f)
          interns = []
          for i in config.get('interns', []):
              interns.append({
                  'name': i['name'],
                  'role': i['role'],
                  'github_id': i['github_id'],
                  'repos': i.get('repos', [])
              })
          print(json.dumps({'include': interns}))
          ")
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "📋 实习生列表: $MATRIX"

  generate-reports:
    needs: load-interns
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.load-interns.outputs.matrix) }}
      max-parallel: 3
      fail-fast: false

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Python 依赖
        run: pip install pyyaml google-genai openai

      - name: 确定审查周
        id: week
        run: |
          if [ -n "${{ inputs.week }}" ]; then
            echo "week=${{ inputs.week }}" >> $GITHUB_OUTPUT
          else
            WEEK=$(date +%Y-W%V)
            echo "week=$WEEK" >> $GITHUB_OUTPUT
          fi

          # 优先使用手动指定的日期，否则根据周次自动计算
          if [ -n "${{ inputs.since }}" ]; then
            echo "since=${{ inputs.since }}" >> $GITHUB_OUTPUT
          else
            MONDAY=$(date -d "last monday" +%Y-%m-%d 2>/dev/null || date -v-monday +%Y-%m-%d)
            echo "since=$MONDAY" >> $GITHUB_OUTPUT
          fi

      - name: 收集本周提交
        id: commits
        run: |
          AUTHOR="${{ matrix.github_id }}"
          SINCE="${{ steps.week.outputs.since }}"

          # ==============================================
          # ✅ 修复 1：repos 是数组，取第一个元素（核心修复！）
          # ==============================================
          REPO="${{ matrix.repos[0] }}"
          REPO_NAME=$(echo "$REPO" | cut -d'/' -f2)
          
          echo "🔍 审查配置:"
          echo "   作者: $AUTHOR"
          echo "   仓库: $REPO"
          echo "   起始日期: $SINCE"

          # 如果不是当前仓库，需要克隆
          CURRENT_REPO="${{ github.repository }}"
          if [ "$REPO" != "$CURRENT_REPO" ]; then
            echo "📥 克隆仓库: $REPO"
            git clone "https://github.com/$REPO.git" /tmp/repo-$REPO_NAME 2>/dev/null || echo "  ⚠️ 警告: 无法克隆 $REPO"
          fi

          # 确定仓库路径
          if [ "$REPO" = "$CURRENT_REPO" ]; then
            REPO_DIR="${{ github.workspace }}"
          else
            REPO_DIR="/tmp/repo-$REPO_NAME"
          fi

          mkdir -p /tmp/intern-review

          if [ -d "$REPO_DIR" ]; then
            echo "📂 仓库路径: $REPO_DIR"
            COMMITS=$(git -C "$REPO_DIR" log \
              --author="$AUTHOR" \
              --since="$SINCE" \
              --pretty=format:"%h|%s|%ai|%an" \
              --no-merges 2>/dev/null || echo "")

            DIFF=$(git -C "$REPO_DIR" log \
              --author="$AUTHOR" \
              --since="$SINCE" \
              --no-merges \
              -p --stat 2>/dev/null || echo "")
          else
            COMMITS=""
            DIFF=""
          fi

          echo "$COMMITS" > /tmp/intern-review/commits.txt
          echo "$DIFF" > /tmp/intern-review/diff.txt

          COMMIT_COUNT=$(echo "$COMMITS" | grep -c '|' || echo "0")
          
          # ==============================================
          # ✅ 修复 2：数字加前缀，避免 GitHub Actions 解析 '0' 报错
          # ==============================================
          echo "commit_count=count_$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "commit_count_raw=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "📋 ${{ matrix.name }} 本周提交: $COMMIT_COUNT 条"
          
          if [ "$COMMIT_COUNT" = "0" ]; then
            echo "  💡 提示: 未抓取到提交，建议手动设置 since 为更早日期（如 2026-01-01）"
          fi

      - name: 生成评审报告
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        if: inputs.dry_run != true
        run: |
          WEEK="${{ steps.week.outputs.week }}"
          NAME="${{ matrix.name }}"
          ROLE="${{ matrix.role }}"
          OUTPUT_DIR="${{ env.REPORTS_BASE }}/$WEEK"
          OUTPUT_FILE="$OUTPUT_DIR/${ROLE}-${NAME}.md"

          mkdir -p "$OUTPUT_DIR"

          EXTRA_ARGS=""
          if [ -n "${{ inputs.provider }}" ]; then
            EXTRA_ARGS="--provider ${{ inputs.provider }}"
          fi

          python3 scripts/generate-report.py \
            --config config/interns.yml \
            --intern "$NAME" \
            --week "$WEEK" \
            --commits-file /tmp/intern-review/commits.txt \
            --diff-file /tmp/intern-review/diff.txt \
            --output "$OUTPUT_FILE" \
            $EXTRA_ARGS

          echo "✅ 报告已生成: $OUTPUT_FILE"

      - name: 试运行模式（只输出prompt）
        if: inputs.dry_run == true
        run: |
          WEEK="${{ steps.week.outputs.week }}"
          NAME="${{ matrix.name }}"

          python3 scripts/generate-report.py \
            --config config/interns.yml \
            --intern "$NAME" \
            --week "$WEEK" \
            --commits-file /tmp/intern-review/commits.txt \
            --diff-file /tmp/intern-review/diff.txt \
            --dry-run

      - name: 上传单人报告
        uses: actions/upload-artifact@v4
        if: inputs.dry_run != true
        with:
          name: report-${{ matrix.name }}-${{ steps.week.outputs.week }}
          path: ${{ env.REPORTS_BASE }}/${{ steps.week.outputs.week }}/
          retention-days: 90

  # 汇总所有报告
  aggregate:
    needs: generate-reports
    if: inputs.dry_run != true && always()
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: pip install pyyaml

      - name: 下载所有报告
        uses: actions/download-artifact@v4
        with:
          path: reports/
          pattern: report-*
          merge-multiple: false

      - name: 整理报告目录
        run: |
          WEEK=$(date +%Y-W%V)
          mkdir -p reports/$WEEK
          for dir in reports/report-*/; do
            cp "$dir"*.md reports/$WEEK/ 2>/dev/null || true
          done
          ls -la reports/$WEEK/

      - name: 汇总分数
        run: |
          python3 scripts/aggregate-scores.py \
            --reports-dir reports/$(date +%Y-W%V) \
            --history

      - name: 上传汇总报告
        uses: actions/upload-artifact@v4
        with:
          name: summary-$(date +%Y-W%V)
          path: reports/
          retention-days: 365
